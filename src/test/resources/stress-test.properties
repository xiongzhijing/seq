# ============================================================
# mysql-sequence 高并发压测参数配置
# ============================================================
# 修改此文件后重新运行 ConcurrencyStressTest 即可生效。
# 参数说明：
#   - threadCount: 并发线程数
#   - callsPerThread: 每线程调用次数
#   - totalCalls: 自动计算 = threadCount × callsPerThread
#   - barrierTimeoutSeconds: CyclicBarrier 等待超时
#   - awaitTimeoutSeconds: CountDownLatch 等待超时
# ============================================================

# ==================== STRICT 模式 ====================
stress.strict.serial.call-count=500
stress.strict.max-id.call-count=250

# ==================== CACHED 模式并发 ====================
stress.cached.concurrent.thread-count=100
stress.cached.concurrent.calls-per-thread=200
stress.cached.concurrent.barrier-timeout-seconds=10
stress.cached.concurrent.await-timeout-seconds=120

# ==================== CACHED 小步长并发 ====================
stress.cached.small-step.thread-count=100
stress.cached.small-step.calls-per-thread=100
stress.cached.small-step.barrier-timeout-seconds=10
stress.cached.small-step.await-timeout-seconds=120

# ==================== DoubleBuffer 切换压测 ====================
stress.double-buffer.thread-count=100
stress.double-buffer.calls-per-thread=100
stress.double-buffer.barrier-timeout-seconds=10
stress.double-buffer.await-timeout-seconds=120

# ==================== SequenceService 路由混合 ====================
stress.service-mixed.thread-count=100
stress.service-mixed.calls-per-thread=200
stress.service-mixed.barrier-timeout-seconds=10
stress.service-mixed.await-timeout-seconds=120

# ==================== 吞吐量基准 ====================
stress.throughput.cached-single.calls=10000
stress.throughput.cached-multi.thread-count=100
stress.throughput.cached-multi.calls-per-thread=200
stress.throughput.cached-multi.barrier-timeout-seconds=10
stress.throughput.cached-multi.await-timeout-seconds=120
stress.throughput.strict-single.calls=200

# ==================== DoubleBuffer 状态验证 ====================
stress.buffer-state.thread-count=100
stress.buffer-state.calls-per-thread=200
stress.buffer-state.barrier-timeout-seconds=10
stress.buffer-state.await-timeout-seconds=120

# ==================== 极端争用测试 ====================
stress.extreme-contention.thread-count=100
stress.extreme-contention.calls-per-thread=200
stress.extreme-contention.barrier-timeout-seconds=10
stress.extreme-contention.await-timeout-seconds=180

# ==================== 配置刷新并发 ====================
stress.config-refresh-concurrent.thread-count=100
stress.config-refresh-concurrent.calls-per-thread=100
stress.config-refresh-concurrent.barrier-timeout-seconds=10
stress.config-refresh-concurrent.await-timeout-seconds=180

# ==================== 关闭时序测试 ====================
stress.shutdown-sequence.thread-count=100
stress.shutdown-sequence.calls-per-thread=200
stress.shutdown-sequence.barrier-timeout-seconds=10
stress.shutdown-sequence.await-timeout-seconds=120
